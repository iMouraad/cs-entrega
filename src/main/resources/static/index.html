<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Entregas Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<div class="container">
    <header>
        <h1>Gestión de Entregas</h1>
        <div class="header-actions">
            <button id="external-invoices-btn" class="button secondary">Ver Facturas Externas</button>
            <button id="add-delivery-btn" class="button primary">Agregar Entrega</button>
        </div>
    </header>

    <div id="invoices-modal" class="modal hidden large-modal">
        <div class="modal-header">
            <h2>Facturas del Sistema Externo</h2>
            <button id="close-invoices-modal-btn" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <div id="invoices-content">
                <p>Cargando facturas...</p>
            </div>
        </div>
    </div>

    <div id="stats-dashboard" class="stats-dashboard">
        <div class="stat-card stat-pendiente" id="filter-pendiente">
            <div class="stat-value" id="count-pendiente">0</div>
            <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card stat-enviado" id="filter-enviado">
            <div class="stat-value" id="count-enviado">0</div>
            <div class="stat-label">Enviados</div>
        </div>
        <div class="stat-card stat-entregado" id="filter-entregado">
            <div class="stat-value" id="count-entregado">0</div>
            <div class="stat-label">Entregados</div>
        </div>
        <div class="stat-card stat-cancelado" id="filter-cancelado">
            <div class="stat-value" id="count-cancelado">0</div>
            <div class="stat-label">Cancelados</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar por número de seguimiento...">
        <button id="search-btn" class="button primary">Rastrear</button>
        <button id="reset-search-btn" class="button" style="display: none;">Ver todas</button>
    </div>

    <main id="deliveries-grid" class="deliveries-grid"></main>
</div>

<div id="modal-backdrop" class="modal-backdrop hidden"></div>
<div id="delivery-modal" class="modal hidden">
    <div class="modal-header">
        <h2 id="modal-title">Agregar Nueva Entrega</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
        <form id="delivery-form">
            <input type="hidden" id="delivery-id">
            <div class="form-group">
                <label for="order-id">ID de Orden</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="order-id" required style="flex: 1;">
                    <button type="button" id="btn-fetch-order" class="button secondary" style="padding: 4px 12px; font-size: 14px;">🔍 Buscar</button>
                </div>
            </div>
            <div class="form-group">
                <label for="customer-name">Cliente</label>
                <input type="text" id="customer-name" placeholder="Nombre completo del comprador">
            </div>
            <div class="form-group">
                <label for="address">Dirección de Entrega</label>
                <input type="text" id="address" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="cliente@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="tracking-number">Número de Seguimiento</label>
                <input type="text" id="tracking-number">
            </div>
            <div class="form-group">
                <label for="status">Estado</label>
                <select id="status">
                    <option value="PENDIENTE">Pendiente</option>
                    <option value="ENVIADO">Enviado</option>
                    <option value="ENTREGADO">Entregado</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="button primary">Guardar y Notificar</button>
            </div>
        </form>
    </div>
</div>

<div id="drawer-backdrop" class="modal-backdrop hidden"></div>
<div id="history-drawer" class="drawer hidden">
    <div class="drawer-header">
        <h2>Detalles de Entrega</h2>
        <button id="close-drawer-btn" class="close-btn">&times;</button>
    </div>
    <div id="drawer-content" class="drawer-body">
        <!-- Se llena con JS -->
    </div>
</div>

    <!-- Map Modal -->
    <div id="map-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Ubicación de Entrega</h2>
                <button type="button" id="close-map-btn" class="close-btn">&times;</button>
            </div>
            <div id="map" style="height: 400px; width: 100%; border-radius: 8px; margin-top: 15px;"></div>
            <div class="modal-footer" style="margin-top: 15px;">
                <p id="map-address-text" style="font-size: 14px; color: #666;"></p>
            </div>
        </div>
    </div>

<script src="app.js"></script>
</body>
</html>
