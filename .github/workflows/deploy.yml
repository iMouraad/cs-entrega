name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: carlospatronerboop
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: carlospatronerboop/ms-usuarios:latest

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            # Crear docker-compose.yml
            cat <<EOF > docker-compose.yml
            services:
              app:
                image: carlospatronerboop/ms-usuarios:latest
                ports:
                  - "8080:8080"
                environment:
                  - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ms_usuarios_db
                  - SPRING_DATASOURCE_USERNAME=postgres
                  - SPRING_DATASOURCE_PASSWORD=postgres
                  - SPRING_JPA_HIBERNATE_DDL_AUTO=update
                depends_on:
                  - db
                restart: always
            
              db:
                image: postgres:16-alpine
                environment:
                  - POSTGRES_DB=ms_usuarios_db
                  - POSTGRES_USER=postgres
                  - POSTGRES_PASSWORD=postgres
                ports:
                  - "5432:5432"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: always
            
            volumes:
              postgres_data:
            EOF

            docker compose pull
            docker compose up -d